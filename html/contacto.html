<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <title>Contacto | Lux & Co.</title>
</head>
<body>

    <header>

    <a href="index.html" class="logo">Lux & Co.</a>

    <nav>
        <a href="coches/coches.html">Coches</a>
        <a href="yates/yates.html">Yates</a>
        <a href="jets/jets.html">Jets</a>
        <a href="relojes/relojes.html">Relojes</a>
    </nav>

    </header>

        <section class="seccion">

            <div class="seccion-cabecera">

                <div>
                    <p class="seccion-etiqueta">FORMULARIO</p>
                    <h1 class="seccion-titulo">Contacto</h1>
                </div>

            </div>

            <form class="formulario">

                <!-- CAMPO TEXTO -->
                <input type="text" placeholder="Nombre completo" required>

                <!-- CAMPO EMAIL -->
                <input type="email" placeholder="Correo electrónico" required>

                <!-- LISTA DESPLEGABLE -->
                <select required>

                    <option value="">
                        Selecciona una categoría
                    </option>

                    <option>Coches</option>
                    <option>Yates</option>
                    <option>Jets</option>
                    <option>Relojes</option>

                </select>

                <!-- ÁREA TEXTO -->
                <textarea
                placeholder="Escribe tu mensaje"
                rows="6"
                required
                ></textarea>

                <!-- BOTÓN -->
                <button type="submit">
                Enviar
                </button>

            </form>

        </section>

    <footer>

        <p class="footer-logo">Lux & Co.</p>
        <p class="footer-texto">© 2026 Lux & Co. · Todos los derechos reservados</p>
        
    </footer>

</body>
</html>
